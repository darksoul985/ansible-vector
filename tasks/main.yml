---
# создать пользователя и группу для управления
- name: create vector group
  ansible.builtin.group:
    name: vector
    system: true
    state: present
  become: true

- name: create vector user
  ansible.builtin.user:
    name: vector
    group: vector
    system: true
    shell: /bin/false
    home: /var/lib/vector
  register: user_created
  become: true

- name: add vector to adm group (for log access)
  ansible.builtin.user:
    name: vector
    groups: adm
    append: true
  when: user_created.changed or user_created is success
  become: true

# создать директорию vector
- name: create vecktor directory
  ansible.builtin.file:
    path: "{{ vector_install_dir }}"
    state: directory
    mode: "0755"
  become: true

# скачать и распаковать архив заданной версии
- name: download vector archive
  ansible.builtin.get_url:
    url: "{{ vector_repo_url }}"
    dest: "/tmp/vector-{{ vector_version }}.tar.gz"
    mode: "0644"
  become: true

- name: unpack vector
  ansible.builtin.unarchive:
    src: "/tmp/vector-{{ vector_version }}.tar.gz"
    dest: "{{ vector_install_dir }}"
    remote_src: true
    extra_opts: ["--strip-components=1"]
    creates: "{{ vector_install_dir }}/bin/vector"
    owner: vector
    group: vector
  become: true

- name: install vector binary
  ansible.builtin.copy:
    src: "{{ vector_install_dir }}/vector-x86_64-unknown-linux-gnu/bin/vector"
    dest: "/usr/local/bin/vector"
    mode: "0755"
    remote_src: true
    owner: root
    group: root
  become: true

- name: create directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "0755"
  loop:
    - { path: "/etc/vector", owner: "root", group: "root" }
    - {
        path: "{{ vector_data_dir }}",
        owner: "{{ vector_user }}",
        group: "{{ vector_group }}",
      }
    - {
        path: "{{ vector_log_dir }}",
        owner: "{{ vector_user }}",
        group: "{{ vector_group }}",
      }
  become: true

- name: restore selinux contexts
  ansible.builtin.command: restorecon -rvf {{ item }}
  loop:
    - /etc/vector
    - "{{ vector_data_dir }}"
    - "{{ vector_log_dir }}"
  become: true
  changed_when: false

# сохранить настройки сервиса
- name: deploy config
  ansible.builtin.template:
    src: vector.toml.j2
    dest: "{{ vector_config_path }}"
    mode: "0640"
    owner: vector
    group: vector
  become: true
  notify: restart vector service

- name: deploy vector config
  ansible.builtin.template:
    src: vector.service.j2
    dest: "/etc/systemd/system/vector.service"
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: restart vector service

- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  become: true
  changed_when: false
  tags:
    - systemd
    - notest

- name: enable and start vector
  ansible.builtin.systemd:
    name: vector
    state: started
    enabled: true
  become: true
  tags:
    - systemd
    - notest

- name: verify vector installation
  block:
    - name: check vector version
      ansible.builtin.command: "/usr/local/bin/vector --version"
      register: vector_version_check
      changed_when: false

    - name: display vector version
      ansible.builtin.debug:
        msg: "successfully installed vector version: {{ vector_version_check.stdout }}"
  rescue:
    - name: show installation error
      ansible.builtin.debug:

- name: check vector service status
  ansible.builtin.systemd:
    name: vector
    daemon_reload: false
  register: vector_status
  changed_when: false
  tags:
    - systemd
    - notest
