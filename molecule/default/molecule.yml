---
# Dependency management (download roles/collections)
dependency:
  name: galaxy

driver:
  name: docker

lint: |
  ansible-lint .
  yamllint .

platforms:
  - name: instance-rocky-9
    image: docker.io/rockylinux/rockylinux:9
    groups:
      - vector
    command: sleep infinity
    cgroup_host_share: true
    privileged: true

  - name: instance-alma-9
    image: quay.io/almalinux/almalinux:9
    groups:
      - vector
    command: sleep infinity
    cgroup_host_share: true
    privileged: true

provisioner:
  name: ansible
  config_options:
    default:
      interpreter_python: /usr/bin/python3

verifier:
  name: ansible

scenario:
  name: default
  test_sequence:
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
